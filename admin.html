<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Mobile |  Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #020617;
            --bg-panel: rgba(15, 23, 42, 0.6);
            --primary-cyan: #00d2ff;
            --danger-red: #ff3366;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --border-glow: rgba(0, 210, 255, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background-color: var(--bg-dark); color: var(--text-light); min-height: 100vh; }
        
        /* Login */
        #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: var(--bg-panel); border: 1px solid var(--primary-cyan); border-radius: 12px; padding: 3rem; text-align: center; width: 350px; }
        .password-input { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border-glow); color: #fff; text-align: center; margin: 15px 0; }
        .btn-login { background: var(--primary-cyan); border: none; padding: 10px 20px; width: 100%; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; }
        
        /* Dashboard */
        #dashboard-screen { display: none; padding: 2rem; max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-glow); padding-bottom: 1rem; margin-bottom: 2rem; }
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .kpi-card { background: var(--bg-panel); padding: 1rem; text-align: center; border: 1px solid var(--border-glow); }
        .log-section { background: var(--bg-panel); padding: 1.5rem; border: 1px solid var(--border-glow); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>ACCESO RESTRINGIDO</h2>
            <input type="password" id="admin-pass" class="password-input" placeholder="••••••••">
            <button id="btn-ingresar" class="btn-login">VERIFICAR</button>
            <p id="login-error" style="color:red; margin-top:10px; display:none;">Clave incorrecta</p>
        </div>
    </div>

    <div id="dashboard-screen">
        <header>
            <h1>🛡️ Dashboard</h1>
            <button class="btn-refresh" onclick="location.reload()">ACTUALIZAR</button>
        </header>
        <div class="kpi-grid">
            <div class="kpi-card"><h3>VISITAS</h3><div id="kpi-visitas" style="font-size: 2rem;">--</div></div>
            <div class="kpi-card"><h3>TIEMPO</h3><div id="kpi-tiempo" style="font-size: 2rem;">--</div></div>
            <div class="kpi-card"><h3>CLICS</h3><div id="kpi-clics" style="font-size: 2rem;">--</div></div>
            <div class="kpi-card"><h3>TASA</h3><div id="kpi-tasa" style="font-size: 2rem;">--</div></div>
        </div>
        <div class="log-section">
            <table>
                <thead><tr><th>Fecha</th><th>Evento</th><th>Ubicación</th></tr></thead>
                <tbody id="log-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Lógica corregida y simplificada
        async function fetchMetrics(password) {
            try {
                const response = await fetch('/api/stats', {
                    headers: { 'Authorization': `Bearer ${password}` }
                });
                
                if (response.status === 401) {
                    document.getElementById('login-error').style.display = 'block';
                    return;
                }

                const data = await response.json();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard-screen').style.display = 'block';
                
                // Procesamiento básico
                const tbody = document.getElementById('log-table-body');
                tbody.innerHTML = '';
                data.forEach(log => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${new Date(log.timestamp).toLocaleTimeString()}</td><td>${log.event}</td><td>${log.details?.ubicacion || '-'}</td>`;
                    tbody.appendChild(tr);
                });
                document.getElementById('kpi-visitas').innerText = data.filter(e => e.event === 'page_view').length;
            } catch (e) {
                alert("Error de red: " + e.message);
            }
        }

        document.getElementById('btn-ingresar').onclick = () => {
            fetchMetrics(document.getElementById('admin-pass').value);
        };
    </script>
</body>
</html>
