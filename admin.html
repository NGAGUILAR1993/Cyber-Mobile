<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Administrador - Cyber SOC v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
    <style>
        /* MANTENIENDO TU DISEÑO ORIGINAL EXACTAMENTE IGUAL */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --neon-cyan: #00d2ff; --neon-magenta: #ff1493; --neon-green: #00ff41; --neon-gold: #ffd700; --bg: #0f1117; --card: #1a1f3a; --text: #e0e0ff; --text-muted: #a0aec0; --ease-out: cubic-bezier(0.23, 1, 0.32, 1); }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }
        header { border-bottom: 1px solid rgba(0, 210, 255, 0.3); background: rgba(15, 17, 23, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 40; padding: 1.5rem 2rem; }
        .header-content { max-width: 1280px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .header-left { display: flex; align-items: center; gap: 1rem; }
        .logo { width: 40px; height: 40px; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta)); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--bg); font-size: 20px; }
        .header-title h1 { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase; color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan); }
        .header-title p { font-size: 0.7rem; color: var(--neon-cyan); font-family: 'Roboto Mono', monospace; margin-top: 0.2rem; }
        .system-status { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: rgba(0, 210, 255, 0.1); border: 1px solid rgba(0, 210, 255, 0.3); border-radius: 4px; font-size: 0.75rem; color: var(--neon-green); }
        .pulse { width: 8px; height: 8px; background: var(--neon-green); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        main { max-width: 1280px; margin: 0 auto; padding: 2rem; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .kpi-card { background: rgba(26, 31, 58, 0.6); border: 1px solid rgba(0, 210, 255, 0.3); backdrop-filter: blur(15px); padding: 1.5rem; border-radius: 4px; }
        .kpi-label { font-size: 0.75rem; color: var(--neon-cyan); margin-bottom: 0.5rem; text-transform: uppercase; }
        .kpi-value { font-size: 2rem; font-weight: bold; color: var(--neon-cyan); }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .chart-card { background: rgba(26, 31, 58, 0.6); border: 1px solid rgba(0, 210, 255, 0.3); padding: 1.5rem; border-radius: 4px; }
        .logs-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .logs-card { background: rgba(26, 31, 58, 0.6); border: 1px solid rgba(0, 210, 255, 0.3); padding: 1.5rem; border-radius: 4px; }
        .log-item { padding: 0.75rem; background: rgba(0, 210, 255, 0.05); border: 1px solid rgba(0, 210, 255, 0.2); border-radius: 4px; margin-bottom: 0.5rem; font-size: 0.85rem; cursor: pointer; }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; display: none; }
        .sidebar { position: fixed; right: 0; top: 0; height: 100vh; width: 400px; background: var(--bg); z-index: 50; transform: translateX(100%); transition: transform 300ms; overflow-y: auto; padding: 1.5rem; border-left: 1px solid #00d2ff; }
        .sidebar.active { transform: translateX(0); display: block; }
        .sidebar-overlay.active { display: block; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-left">
                <div class="logo">⚡</div>
                <div class="header-title"><h1>Terminal de Administrador</h1><p>v2.0 | SOC SYSTEM ONLINE</p></div>
            </div>
            <div class="system-status"><div class="pulse"></div><span id="status-text">CARGANDO...</span></div>
        </div>
    </header>

    <main>
        <div class="kpi-grid">
            <div class="kpi-card"><div class="kpi-label">Accesos Totales</div><div class="kpi-value" id="kpi-total">0</div></div>
            <div class="kpi-card"><div class="kpi-label">Usuarios Activos</div><div class="kpi-value" id="kpi-users">0</div></div>
            <div class="kpi-card"><div class="kpi-label">Tiempo Promedio (ms)</div><div class="kpi-value" id="kpi-time">0</div></div>
            <div class="kpi-card"><div class="kpi-label">Salud del Sistema</div><div class="kpi-value" id="kpi-health">100%</div></div>
        </div>

        <div class="charts-grid">
            <div class="chart-card"><div class="chart-title">Accesos por Hora</div><canvas id="accessChart"></canvas></div>
            <div class="chart-card"><div class="chart-title">Distribución</div><canvas id="distributionChart"></canvas></div>
        </div>

        <div class="logs-section">
            <div class="logs-card"><div class="logs-title">Accesos Recientes</div><div id="logs-container"></div></div>
            <div class="logs-card"><div class="logs-title">Ubicaciones Top</div><div id="locations-container"></div></div>
        </div>
    </main>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="sidebar-title">Detalles</div><button class="close-btn" id="closeBtn">X</button></div>
        <div class="sidebar-content" id="sidebarContent"></div>
    </div>

    <script>
        let charts = {};
        let allAccesses = [];

        async function loadMetrics() {
            const pass = prompt("Ingrese clave:");
            try {
                const response = await fetch('/api/stats', { headers: { 'Authorization': `Bearer ${pass}` }});
                if (response.status !== 200) throw new Error("Acceso denegado");
                
                allAccesses = await response.json();
                
                // Mapeo automático a tus elementos
                document.getElementById('kpi-total').textContent = allAccesses.length;
                document.getElementById('kpi-users').textContent = new Set(allAccesses.map(e => e.ip)).size;
                document.getElementById('kpi-time').textContent = Math.round(allAccesses.reduce((acc, curr) => acc + (curr.duration || 0), 0) / (allAccesses.length || 1));
                document.getElementById('status-text').textContent = 'SISTEMA ONLINE';

                renderLogs();
                initializeCharts(); // Dibujar gráficos con datos reales
            } catch (e) {
                alert(e.message);
            }
        }

        function renderLogs() {
            const container = document.getElementById('logs-container');
            container.innerHTML = allAccesses.slice(-10).reverse().map((log, idx) => `
                <div class="log-item" onclick="openSidebar(${idx})">
                    <div><span style="color:var(--neon-cyan)">${new Date(log.timestamp).toLocaleTimeString()}</span></div>
                    <div style="font-size:0.8rem">${log.event}</div>
                </div>
            `).join('');
        }

        function initializeCharts() {
            const ctx = document.getElementById('distributionChart').getContext('2d');
            const dataCounts = [allAccesses.filter(e => e.event === 'page_view').length, allAccesses.filter(e => e.event === 'click_cta').length];
            new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['Visitas', 'Clics'], datasets: [{ data: dataCounts, backgroundColor: ['#00d2ff', '#ff1493'] }] }
            });
        }

        function openSidebar(idx) {
            const log = allAccesses.slice().reverse()[idx];
            document.getElementById('sidebarContent').innerHTML = `<pre>${JSON.stringify(log, null, 2)}</pre>`;
            document.getElementById('sidebar').classList.add('active');
            document.getElementById('sidebarOverlay').classList.add('active');
        }

        document.getElementById('closeBtn').onclick = () => {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('sidebarOverlay').classList.remove('active');
        };

        document.addEventListener('DOMContentLoaded', loadMetrics);
    </script>
</body>
</html>
