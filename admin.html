<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cyber Mobile |  Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon-cyan: #00d2ff; --bg: #020617; --panel: rgba(15, 23, 42, 0.8); }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: white; padding: 20px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .kpi { background: var(--panel); border: 1px solid var(--neon-cyan); padding: 20px; text-align: center; border-radius: 4px; }
        .kpi h3 { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--neon-cyan); }
        .kpi .val { font-size: 2rem; font-weight: 700; }
        .charts-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-box { background: var(--panel); padding: 20px; border: 1px solid var(--neon-cyan); height: 300px; }
        table { width: 100%; border-collapse: collapse; background: var(--panel); }
        th { color: var(--neon-cyan); font-family: 'Orbitron'; padding: 15px; border-bottom: 1px solid #334155; }
        td { padding: 12px; border-bottom: 1px solid #1e293b; text-align: center; }
    </style>
</head>
<body>

    <header style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h1 style="font-family:'Orbitron'; color:var(--neon-cyan);">🛡️ SOC TERMINAL v2.0</h1>
        <button onclick="location.reload()" style="background:transparent; border:1px solid var(--neon-cyan); color:var(--neon-cyan); padding:5px 15px; cursor:pointer;">RESCAN</button>
    </header>

    <div class="dashboard-grid">
        <div class="kpi"><h3>VISITAS</h3><div id="kpi-visitas" class="val">--</div></div>
        <div class="kpi"><h3>CLICS</h3><div id="kpi-clics" class="val">--</div></div>
        <div class="kpi"><h3>RETENCIÓN</h3><div id="kpi-tiempo" class="val">--</div></div>
        <div class="kpi"><h3>TASA</h3><div id="kpi-tasa" class="val">--</div></div>
    </div>

    <div class="charts-container">
        <div class="chart-box"><canvas id="chart1"></canvas></div>
        <div class="chart-box"><canvas id="chart2"></canvas></div>
    </div>

    <div class="log-section">
        <table>
            <thead><tr><th>HORA</th><th>EVENTO</th><th>DETALLE</th></tr></thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>

    <script>
        // Esta función procesa los datos y dibuja todo
        function renderDashboard(data) {
            const visitas = data.filter(e => e.event === 'page_view');
            const clics = data.filter(e => e.event === 'click_cta');
            
            document.getElementById('kpi-visitas').innerText = visitas.length;
            document.getElementById('kpi-clics').innerText = clics.length;
            document.getElementById('kpi-tasa').innerText = visitas.length > 0 ? Math.round((clics.length/visitas.length)*100)+'%' : '0%';

            const tbody = document.getElementById('log-body');
            data.slice(-10).reverse().forEach(log => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${new Date(log.timestamp).toLocaleTimeString()}</td><td>${log.event}</td><td>${log.details?.ubicacion || '-'}</td>`;
                tbody.appendChild(tr);
            });

            new Chart(document.getElementById('chart1'), {
                type: 'doughnut',
                data: { labels: ['Visitas', 'Clics'], datasets: [{ data: [visitas.length, clics.length], backgroundColor: ['#00d2ff', '#ff3366'] }] },
                options: { maintainAspectRatio: false }
            });
        }

        // Llamada inicial
        const pass = prompt("Clave de Acceso:");
        fetch('/api/stats', { headers: { 'Authorization': `Bearer ${pass}` } })
            .then(res => res.json())
            .then(data => renderDashboard(data));
    </script>
</body>
</html>
